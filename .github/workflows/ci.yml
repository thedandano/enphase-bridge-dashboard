name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Docker build
        run: docker build -t enphase-bridge-dashboard:ci .
        if: hashFiles('Dockerfile') != ''

      - name: Check image size
        if: hashFiles('Dockerfile') != ''
        run: |
          SIZE=$(docker image inspect enphase-bridge-dashboard:ci --format='{{.Size}}')
          echo "Image size: $SIZE bytes"
          if [ "$SIZE" -gt 104857600 ]; then
            echo "Image exceeds 100MB limit ($SIZE bytes)"
            exit 1
          fi
